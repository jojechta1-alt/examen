<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chrono-Vision</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }

    /* ── HUD superior ── */
    #hud {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      box-sizing: border-box;
      pointer-events: none;
    }
    #hud .badge {
      background: rgba(10, 14, 20, 0.75);
      color: #7fd9ff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(127, 217, 255, 0.4);
    }

    /* ── Panel de auth (esquina superior derecha) ── */
    #auth-panel {
      position: fixed;
      top: 16px; right: 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #user-label {
      color: #7fd9ff;
      font-size: 13px;
      background: rgba(10,14,20,0.75);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(127,217,255,0.4);
      display: none;
    }
    #login-btn, #logout-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #login-btn {
      background: #fff;
      color: #222;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #login-btn img { width: 16px; height: 16px; }
    #login-btn:hover { opacity: 0.85; }
    #logout-btn {
      background: rgba(255,80,80,0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255,80,80,0.4);
      display: none;
    }
    #logout-btn:hover { opacity: 0.75; }

    /* ── Panel de progreso ── */
    #progress-panel {
      position: fixed;
      top: 60px; right: 20px;
      z-index: 999;
      background: rgba(10,14,20,0.8);
      border: 1px solid rgba(127,217,255,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      color: #7fd9ff;
      font-size: 12px;
      min-width: 160px;
      display: none;
    }
    #progress-panel .label { color: #888; margin-bottom: 6px; letter-spacing: 0.5px; }
    #progress-bar-wrap {
      background: rgba(127,217,255,0.1);
      border-radius: 8px;
      height: 6px;
      margin: 6px 0;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #7fd9ff;
      border-radius: 8px;
      width: 0%;
      transition: width 0.6s ease;
    }
    #progress-text { color: #cfeeff; }

    /* ── Panel de control inferior ── */
    #control-panel {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #scan-btn {
      background: linear-gradient(180deg, #1a8fd1, #0c5e91);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(26, 143, 209, 0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #scan-btn:active  { transform: scale(0.96); }
    #scan-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Status ── */
    #status-line {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      color: #cfeeff;
      font-size: 13px;
      background: rgba(10, 14, 20, 0.6);
      padding: 6px 14px;
      border-radius: 12px;
      z-index: 999;
      pointer-events: none;
      min-height: 14px;
      white-space: nowrap;
    }

    /* ── Scan overlay ── */
    #scan-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(127,217,255,0.15), transparent 70%);
      pointer-events: none;
      z-index: 998;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #scan-overlay.active { opacity: 1; animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* ── Mira central ── */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 24px; height: 24px;
      pointer-events: none;
      z-index: 997;
      opacity: 0.6;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #7fd9ff;
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; left: 0; }

    /* ── Panel de info histórica ── */
    #info-panel {
      position: fixed;
      bottom: 100px; left: 20px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 16px;
      border-radius: 10px;
      max-width: 280px;
      border: 1px solid #00fff7;
      font-family: monospace;
      z-index: 999;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    #info-panel h3 { color: #00fff7; margin: 0 0 8px; font-size: 14px; }
    #info-panel p  { margin: 0 0 6px; font-size: 12px; line-height: 1.5; color: #ccc; }
    #info-panel small { color: #666; }
    #info-panel button {
      margin-top: 10px;
      background: #00fff7;
      color: #000;
      border: none;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    /* ── Toast notificación ── */
    #toast {
      position: fixed;
      top: 70px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,255,200,0.15);
      color: #00ffc8;
      border: 1px solid rgba(0,255,200,0.4);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 1001;
      display: none;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- HUD superior izquierda -->
  <div id="hud">
    <div class="badge" id="year-badge">VISTA ACTUAL · 2077</div>
    <div class="badge" id="confidence-badge" style="display:none;"></div>
  </div>

  <!-- Auth: esquina superior derecha -->
  <div id="auth-panel">
    <span id="user-label"></span>
    <button id="login-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Iniciar sesión
    </button>
    <button id="logout-btn" onclick="logout()">Salir</button>
  </div>

  <!-- Progreso del explorador -->
  <div id="progress-panel">
    <div class="label">EXPLORACIÓN</div>
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
    <div id="progress-text">0 / 5 lugares</div>
  </div>

  <!-- Efectos visuales -->
  <div id="scan-overlay"></div>
  <div id="crosshair"></div>

  <!-- Status y controles -->
  <div id="status-line"></div>
  <div id="control-panel">
    <button id="scan-btn" disabled>🔒 Inicia sesión para explorar</button>
  </div>

  <!-- Panel info histórica -->
  <div id="info-panel">
    <h3 id="info-name"></h3>
    <p  id="info-desc"></p>
    <small id="info-years"></small><br>
    <button onclick="document.getElementById('info-panel').style.display='none'">Cerrar</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- ESCENA A-FRAME -->
  <a-scene>
    <a-assets>
      <a-mixin id="ruin-material"  material="color: #5a5650; roughness: 0.9"></a-mixin>
      <a-mixin id="past-material"  material="color: #d9c9a3; roughness: 0.6"></a-mixin>
    </a-assets>

    <!-- Cielo: estado "presente" (devastado) -->
    <a-sky id="sky" color="#4a4a48"></a-sky>

    <a-entity id="lighting">
      <a-light type="ambient"     color="#888" intensity="0.6"></a-light>
      <a-light type="directional" color="#fff" intensity="0.5" position="2 4 2"></a-light>
    </a-entity>

    <a-plane id="ground" position="0 0 0" rotation="-90 0 0"
             width="60" height="60" color="#3a3833"></a-plane>

    <!-- Escena base: ruinas estáticas siempre visibles -->
    <a-entity id="present-scene">
      <a-box position="-4 1.5 -6" width="2" height="3" depth="2" mixin="ruin-material"></a-box>
      <a-box position=" 3 1.0 -8" width="3" height="2" depth="2" mixin="ruin-material"></a-box>
      <a-box position=" 0 2.0 -10" width="2" height="4" depth="2" mixin="ruin-material"></a-box>
    </a-entity>

    <!-- Elementos reconstruidos del pasado (se inyectan desde app.js) -->
    <a-entity id="reconstruction-root"></a-entity>

    <a-entity camera look-controls wasd-controls position="0 1.6 4"></a-entity>
  </a-scene>

  <!-- Firebase SDK (módulos) -->
  <script type="module" src="app.js"></script>

</body>
</html>
